name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/design-system/**'
      - 'packages/shared/**'
      - 'apps/worker/src/trpc/**'
      - '.github/workflows/deploy-web.yml'
      - 'package.json'
      - 'bun.lock'
      - 'bunfig.toml'
  workflow_dispatch:

concurrency:
  group: deploy-web-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_YOUTUBE_CLIENT_ID: ${{ vars.VITE_YOUTUBE_CLIENT_ID }}
      VITE_SPOTIFY_CLIENT_ID: ${{ vars.VITE_SPOTIFY_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Validate required deployment configuration
        run: |
          missing=0
          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            VITE_API_URL \
            VITE_CLERK_PUBLISHABLE_KEY \
            VITE_YOUTUBE_CLIENT_ID \
            VITE_SPOTIFY_CLIENT_ID
          do
            if [ -z "${!name}" ]; then
              echo "Missing required deployment setting: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run --cwd apps/web build

      - name: Deploy to Cloudflare Workers
        run: bunx wrangler@3.95.0 deploy --env production
        working-directory: apps/web
