name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build --filter=@zine/shared

      - name: Run database migrations
        run: bun run db:migrate
        working-directory: apps/worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Capture release metadata
        run: |
          echo "RELEASE_GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_BUILD_ID=gha_${GITHUB_RUN_ID}" >> "$GITHUB_ENV"
          echo "RELEASE_DEPLOYED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "RELEASE_RING=100%" >> "$GITHUB_ENV"

      - name: Deploy to Cloudflare
        run: |
          bunx wrangler deploy --env production \
            --var RELEASE_GIT_SHA:${RELEASE_GIT_SHA} \
            --var RELEASE_BUILD_ID:${RELEASE_BUILD_ID} \
            --var RELEASE_DEPLOYED_AT:${RELEASE_DEPLOYED_AT} \
            --var RELEASE_RING:${RELEASE_RING}
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
