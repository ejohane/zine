name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build --filter=@zine/shared

      - name: Run type check
        run: bun run typecheck

  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run mobile tests
        run: bun run --cwd apps/mobile test --runInBand

  test-worker:
    name: Worker Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build --filter=@zine/shared

      - name: Run worker tests
        run: bun run test:worker:ci

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run web unit and component tests
        run: bun run test:web

  test-web-browser:
    name: Web Browser Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Run Storybook and smoke browser tests
        run: |
          bun run test:web:storybook
          bun run test:web:e2e

      - name: Upload web browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-browser-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results

  observability-checks:
    name: Observability Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build --filter=@zine/shared

      - name: Run observability worker tests
        run: |
          bun run --cwd apps/worker test:run \
            src/lib/telemetry.test.ts \
            src/diagnostics/health.test.ts \
            src/sync/consumer.test.ts \
            src/sync/dlq-consumer.test.ts \
            src/sync/service.test.ts

      - name: Run observability script tests
        run: bun run test:observability

      - name: Run observability policy checks
        run: bun run observability:check
        env:
          ZINE_OBSERVABILITY_SUMMARY_PATH: observability-summary.json

      - name: Upload observability summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-summary
          path: observability-summary.json

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build
